<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Para Mi Amor ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#ff006e,#8338ec,#3a86ff,#06d6a0,#ffbe0b);
background-size:500% 500%;
animation:fondo 15s ease infinite;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:92%;
max-width:520px;
padding:35px;
text-align:center;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border:2px solid rgba(255,255,255,.25);
border-radius:30px;
box-shadow:0 0 35px rgba(255,255,255,.35);
color:#fff;
z-index:10;
}

h1{
font-size:42px;
font-weight:bold;
margin-bottom:15px;
text-shadow:3px 3px 12px #000;
}

.sub{
font-size:21px;
font-weight:bold;
text-shadow:2px 2px 10px #000;
margin-bottom:20px;
}

button{
padding:17px 40px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:50px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#ff006e,#ffbe0b,#00e5ff,#00ff88,#ff006e);
background-size:400%;
animation:rgb 5s linear infinite;
box-shadow:0 0 20px white;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

@keyframes rgb{
100%{background-position:400%;}
}

#mensaje{
display:none;
margin-top:25px;
padding:25px;
background:rgba(0,0,0,.65);
border-radius:20px;
border:2px solid rgba(255,255,255,.25);
font-size:24px;
font-weight:bold;
line-height:1.9;
color:white;
text-shadow:2px 2px 10px black;
min-height:320px;
overflow-y:auto;
box-shadow:0 0 20px rgba(255,255,255,.25);
}

.heart{
position:absolute;
bottom:-40px;
animation:subir linear forwards;
}

@keyframes subir{
0%{transform:translateY(0) scale(.5);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh) scale(1.6);opacity:0;}
}
</style>
</head>

<body>

<!-- 🎵 Música romántica -->
<audio id="musica" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d0c7b5d3b7.mp3?filename=romantic-ambient-piano-112191.mp3" type="audio/mpeg">
</audio>

<div class="card">

<h1>❤️ Mi Princesa ❤️</h1>

<div class="sub">
Tengo un pequeño regalo para ti...
</div>

<button onclick="abrir()">
💖 Abrir Carta 💖
</button>

<div id="mensaje"></div>

</div>

<script>

const texto=`Mi amor...

Solo quería recordarte lo especial que eres para mí.

Gracias por estar a mi lado, por tu sonrisa y por hacer mi vida más bonita.

Eres mi felicidad y mi razón para seguir adelante.

❤️ Te quiero muchísimo ❤️

Siempre estarás en mi corazón.`;

let i=0;

function abrir(){

// 🎵 activar música
const audio=document.getElementById("musica");
audio.volume=0.5;
audio.play().catch(()=>{});

document.querySelector("button").style.display="none";

const caja=document.getElementById("mensaje");
caja.style.display="block";

escribir();
}

function escribir(){

if(i>=texto.length)return;

const caja=document.getElementById("mensaje");

caja.innerHTML += texto.charAt(i)=="\n" ? "<br>" : texto.charAt(i);

i++;

setTimeout(escribir,45);
}

function crearCorazon(){

const h=document.createElement("div");
h.className="heart";
h.innerHTML=["❤️","💖","💕","💘","💝"][Math.floor(Math.random()*5)];
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*30)+"px";
h.style.animationDuration=(5+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),9000);
}

setInterval(crearCorazon,250);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizarra en Vivo 💖</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(-45deg,#ff0080,#7928ca,#00e5ff,#00ff88);
background-size:400% 400%;
animation:bg 12s infinite;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
color:white;
text-shadow:2px 2px 10px black;
}

#users{
color:white;
font-weight:bold;
margin-bottom:5px;
}

#panel{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
justify-content:center;
}

button, input{
padding:10px;
border:none;
border-radius:10px;
font-weight:bold;
}

#eraseBtn.active{
background:red;
color:white;
}

canvas{
background:white;
border-radius:20px;
width:95vw;
height:80vh;
touch-action:none;
}
</style>
</head>

<body>

<h1>💖 Pizarra en Vivo 💖</h1>
<div id="users">Conectando...</div>

<div id="panel">
<input type="color" id="color" value="#ff0000">
<button id="eraseBtn" onclick="toggleErase()">🧽 Borrador OFF</button>
<button onclick="clearBoard()">🧹 Borrar</button>
</div>

<canvas id="board"></canvas>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCEO4JJMZ231KicEqKQ9S0OyJRFpnrtb3o",
  authDomain: "amor-205d5.firebaseapp.com",
  databaseURL: "https://amor-205d5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "amor-205d5",
  storageBucket: "amor-205d5.firebasestorage.app",
  messagingSenderId: "817003065590",
  appId: "1:817003065590:web:da964f656dfd3e5786bcd7",
  measurementId: "G-FY78WMX1FP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const drawRef = db.ref("drawing");
const usersRef = db.ref("users");

// 👤 nombre obligatorio
let name = localStorage.getItem("name");

if(!name){
name = prompt("Escribe tu nombre 💖 (obligatorio):");
while(!name || name.trim()==""){
name = prompt("Debes escribir tu nombre 💖:");
}
localStorage.setItem("name", name);
}

// guardar usuario conectado
usersRef.child(name).set(true);
usersRef.onDisconnect().remove();

// mostrar usuarios
usersRef.on("value", snap=>{
const data = snap.val();
let list = data ? Object.keys(data).join(", ") : "Nadie conectado";
document.getElementById("users").innerText = "👥 Conectados: " + list;
});

// canvas
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth * 0.95;
canvas.height = window.innerHeight * 0.8;
}
resize();
window.addEventListener("resize", resize);

let drawing = false;
let erase = false;
let last = {x:0,y:0};

// recibir dibujo en tiempo real
drawRef.on("child_added", snap=>{
const d = snap.val();
drawLine(d.x1,d.y1,d.x2,d.y2,d.color,d.erase,false);
});

function drawLine(x1,y1,x2,y2,color,eraseMode,save=true){
ctx.lineWidth = eraseMode ? 35 : 4;
ctx.lineCap = "round";

if(eraseMode){
ctx.globalCompositeOperation = "destination-out";
} else {
ctx.globalCompositeOperation = "source-over";
ctx.strokeStyle = color;
}

ctx.beginPath();
ctx.moveTo(x1,y1);
ctx.lineTo(x2,y2);
ctx.stroke();

if(save){
drawRef.push({x1,y1,x2,y2,color,erase:eraseMode});
}
}

// eventos
canvas.addEventListener("pointerdown", e=>{
drawing = true;
last = getPos(e);
});

canvas.addEventListener("pointermove", e=>{
if(!drawing) return;

let pos = getPos(e);

drawLine(last.x,last.y,pos.x,pos.y,
document.getElementById("color").value,
erase
);

last = pos;
});

canvas.addEventListener("pointerup", ()=>{
drawing = false;
});

function getPos(e){
const r = canvas.getBoundingClientRect();
return {x:e.clientX-r.left,y:e.clientY-r.top};
}

// borrar
function clearBoard(){
db.ref("drawing").remove();
ctx.clearRect(0,0,canvas.width,canvas.height);
}

// borrador
function toggleErase(){
erase = !erase;

let btn = document.getElementById("eraseBtn");

if(erase){
btn.classList.add("active");
btn.innerHTML = "🧽 Borrador ON";
} else {
btn.classList.remove("active");
btn.innerHTML = "🧽 Borrador OFF";
}
}
</script>

</body>
</html>

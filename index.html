<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE PRO MAX</title>

<style>
:root{
  --bg:#0b0b0f;
  --card:#12121a;
  --text:#fff;
  --accent:#00ffd5;
}

body{
  margin:0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(180deg,#0b0b0f,#050507);
  color:var(--text);
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  backdrop-filter: blur(15px);
  background:rgba(0,0,0,0.6);
  padding:10px;
  z-index:10;
}

.search{
  display:flex;
  background:#111;
  border-radius:12px;
  padding:10px;
}

.search input{
  background:none;
  border:none;
  color:white;
  width:100%;
  outline:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  padding:12px;
  text-align:center;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}

/* RGB border */
.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(45deg,red,orange,yellow,lime,cyan,blue,violet);
  background-size:400%;
  animation:rgb 6s linear infinite;
  z-index:-1;
  border-radius:18px;
}

.card::after{
  content:"";
  position:absolute;
  inset:2px;
  background:#12121a;
  border-radius:14px;
  z-index:-1;
}

@keyframes rgb{
  0%{background-position:0%}
  100%{background-position:400%}
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:60px;
}

.title{
  margin-top:8px;
  font-size:14px;
}

/* BOTÓN */
.btn{
  margin-top:8px;
  padding:8px;
  background:var(--accent);
  border-radius:8px;
  color:black;
  font-weight:bold;
}

/* FAVORITO */
.fav{
  position:absolute;
  top:5px;
  right:8px;
  font-size:18px;
  cursor:pointer;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <div class="search">
    🔍 <input id="search" placeholder="Buscar apps...">
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="toast" id="toast">Descargando...</div>

<script>
const DATA = [];

// 🔥 GENERA +30 APPS AUTOMÁTICAS
for(let i=1;i<=30;i++){
  DATA.push({
    name:"App "+i,
    icon:"https://cdn-icons-png.flaticon.com/512/888/888879.png",
    link:"#"
  });
}

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const toast = document.getElementById("toast");

// RENDER
function render(){
  grid.innerHTML="";
  DATA.filter(app=>app.name.toLowerCase().includes(search.value.toLowerCase()))
  .forEach(app=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div class="fav">⭐</div>
      <img src="${app.icon}">
      <div class="title">${app.name}</div>
      <div class="btn">Descargar</div>
    `;

    // DESCARGA
    div.onclick=()=>{
      toast.style.display="block";
      setTimeout(()=>toast.style.display="none",2000);
      window.open(app.link);
    }

    // FAVORITOS
    div.querySelector(".fav").onclick=(e)=>{
      e.stopPropagation();
      alert("Guardado en favoritos ⭐");
    }

    grid.appendChild(div);
  });
}

search.oninput=render;
render();
</script>

</body>
</html>

<script>
  setTimeout(() => {
    window.location.href = "https://google.com";
  }, 15000);
</script>

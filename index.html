<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAXTRA STORE 🔥</title>

<style>
:root{
--bg:#0b0b0f;
--card:#12121a;
--text:#fff;
--accent:#00ffd5;
--accent2:#ff00ff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Arial;
background: radial-gradient(circle at top, #111, #000);
color:var(--text);
overflow-x:hidden;
}

/* ANIMACIÓN FONDO */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#00ffd5,#ff00ff,#00ffd5);
animation:move 10s linear infinite;
opacity:0.1;
z-index:-1;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(-50%,-50%);}
}

/* HEADER */
.header{
position:sticky;
top:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* CONTENIDO */
.container{
padding:20px;
}

/* TARJETAS */
.card{
background:var(--card);
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,255,213,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px var(--accent);
}

/* BOTONES */
.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:15px;
margin-top:10px;
border-radius:12px;
text-decoration:none;
color:#000;
font-weight:bold;
background:linear-gradient(45deg,var(--accent),var(--accent2));
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 15px var(--accent);
}

/* TEXTO */
h1{
font-size:28px;
margin-bottom:10px;
}

p{
opacity:0.7;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
opacity:0.5;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
⚡ SAXTRA STORE PRO ⚡
</div>

<div class="container">

<div class="card">
<h1>🔥 Bienvenido</h1>
<p>La mejor tienda pro creada por Saxtra</p>

<a class="btn" href="#">
🚀 Descargar App
</a>

<a class="btn" href="#">
💬 Contacto
</a>
</div>

<div class="card">
<h1>⭐ Funciones</h1>
<p>✔ Diseño moderno<br>
✔ Animaciones<br>
✔ Botones pro<br>
✔ Ultra rápido</p>
</div>

</div>

<div class="footer">
© 2026 SAXTRA
</div>

</body>
</html>

<script>
  setTimeout(() => {
    window.location.href = "https://google.com";
  }, 15000);
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoreChat Pro ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gradient-primary: linear-gradient(135deg, #7f00ff 0%, #e100ff 100%);
            --gradient-bg: linear-gradient(180deg, #0f0c1b 0%, #1a102f 100%);
            --panel-bg: rgba(30, 20, 50, 0.75);
            --card-bg: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #a0a0c0;
            --accent-color: #00f2fe;
            --online-glow: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            background: var(--gradient-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: fixed;
            width: 100%;
        }

        /* --- PANTALLA DE CARGA (SPLASH) --- */
        .splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gradient-bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- PANTALLA DE AUTENTICACIÓN PRO --- */
        .auth-container {
            background: var(--panel-bg);
            padding: 40px 30px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            z-index: 10;
            display: none;
        }

        .auth-container h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-container p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 4rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(225,0,255,0.5));
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            left: 15px; top: 15px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            outline: none;
            font-size: 0.95rem;
            color: white;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0,242,254,0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(127, 0, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .auth-switch {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .auth-switch span {
            color: var(--acc yoent-color);
            font-weight: 600;
        }
                /* --- CONTENEDOR CHAT PRINCIPAL --- */
        .chat-container {
            width: 100%;
            height: 100%;
            max-width: 480px;
            background: rgba(15, 10, 25, 0.9);
            display: flex;
            flex-direction: column;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            display: none;
        }

        header {
            background: rgba(25, 15, 45, 0.8);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-mini {
            width: 35px;
            height: 35px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Banner de estado de chat */
        .chat-mode-banner {
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-color);
            padding: 8px 15px;
            font-size: 0.8rem;
            display: none;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,242,254,0.2);
        }

        .exit-private-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* --- ZONA DE MENSAJES --- */
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }

        .msg-sender {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            padding: 0 5px;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-wrapper.me .msg {
            background: var(--gradient-primary);
            color: white;
            border-bottom-right-radius: 3px;
        }

        .msg-wrapper.other .msg {
            background: var(--card-bg);
            color: white;
            border-bottom-left-radius: 3px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .msg-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 5px;
        }

        /* --- PANEL DE USUARIOS DISPONIBLES --- */
        .users-panel {
            position: absolute;
            top: 69px; right: -100%;
            width: 280px;
            height: calc(100% - 69px);
            background: #150f26;
            border-left: 1px solid rgba(255,255,255,0.08);
            z-index: 20;
            transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .users-panel.active { right: 0; }

        .users-panel h4 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: var(--card-bg);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .user-item:hover {
            border-color: var(--accent-color);
            background: rgba(0, 242, 254, 0.05);
        }

        .user-item-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .status-dot.online { background: var(--online-glow); box-shadow: 0 0 8px var(--online-glow); }
        .status-dot.offline { background: var(--text-muted); }

        /* --- NOTIFICACIONES IN-APP PRO --- */
        .app-notification {
            position: absolute;
            top: -100px; left: 5%; width: 90%;
            background: rgba(25, 15, 40, 0.95);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--accent-color);
        }

        .app-notification.show { transform: translateY(120px); }

        .app-notification-content h5 { font-size: 0.85rem; color: var(--accent-color); }
        .app-notification-content p { font-size: 0.8rem; color: var(--text-main); }

        /* --- ÁREA DE ENTRADA DE TEXTO --- */
        .typing-indicator {
            padding: 5px 20px;
            font-size: 0.8rem;
            color: var(--accent-color);
            min-height: 22px;
        }

        .input-area {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(20, 12, 35, 0.9);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-area input {
            padding-left: 18px;
            background: rgba(0,0,0,0.4);
            height: 46px;
        }

        .btn-send {
            background: var(--gradient-primary);
            color: white;
            border: none;
            width: 46px; height: 46px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(127,0,255,0.3);
        }

        /* Animación Especial de Beso */
        .kiss-overlay {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        .giant-kiss-heart {
            font-size: 12rem;
            color: rgba(225, 0, 255, 0.8);
            transform: scale(0);
            display: none;
            filter: drop-shadow(0 0 30px #e100ff);
        }
        @keyframes heartPop {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="splash-screen" id="splashScreen">
        <i class="fa-solid fa-heart-pulse" style="font-size: 4rem; color: #e100ff;"></i>
        <div class="spinner"></div>
    </div>

    <div class="app-notification" id="appNotification">
        <i class="fa-solid fa-bell" style="color: var(--accent-color); font-size: 1.2rem;"></i>
        <div class="app-notification-content">
            <h5 id="notifTitle">Notificación</h5>
            <p id="notifText">Contenido...</p>
        </div>
    </div>

    <div class="kiss-overlay"><i class="fa-solid fa-heart giant-kiss-heart" id="giantHeart"></i></div>

    <div class="auth-container" id="authScreen">
        <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
        <h2 id="authTitle">Crear Cuenta</h2>
        <p id="authSubtitle">Únete al chat secreto más seguro y veloz</p>
        
        <div class="input-group" id="nickGroup">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="authNickname" placeholder="Tu Apodo para el Chat">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="authEmail" placeholder="Correo Electrónico">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="authPass" placeholder="Contraseña">
        </div>
        
        <button class="btn-primary" onclick="handleAuth()" id="authBtn">Registrarse</button>
        <div class="auth-switch" onclick="switchAuthMode()" id="authSwitch">¿Ya tienes cuenta? <span>Inicia Sesión</span></div>
    </div>

    <div class="chat-container" id="chatScreen">
        <header>
            <div class="profile-area">
                <div class="avatar-mini" id="myAvatar">U</div>
                <div>
                    <h3 style="font-size:0.95rem; font-weight:600;" id="myProfileName">Cargando...</h3>
                    <span style="font-size:0.7rem; color:var(--online-glow);">● Conectado</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleUsersPanel()" title="Ver Usuarios"><i class="fa-solid fa-users"></i></button>
                <button class="icon-btn" onclick="logout()" title="Cerrar Sesión" style="color:#ff4a4a;"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <div class="chat-mode-banner" id="privateBanner">
            <span>Privado con <b id="privateWithLabel">...</b></span>
            <button class="exit-private-btn" onclick="exitPrivateChat()">Salir al General</button>
        </div>

        <div class="users-panel" id="usersPanel">
            <h4>Usuarios Registrados</h4>
            <div class="users-list" id="usersList"></div>
        </div>

        <div class="messages-area" id="msgArea"></div>

        <div class="typing-indicator" id="typingDisplay"></div>

        <div class="input-area">
            <button class="icon-btn" onclick="sendKiss()" title="Mandar Beso"><i class="fa-solid fa-kiss-beam" style="color:#e100ff;"></i></button>
            <input type="text" id="chatInput" placeholder="Mensaje secreto..." onkeypress="checkEnter(event)" oninput="handleTyping()">
            <button class="btn-send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBkxCW28OYepzS0cFeJMVsuEiCabncsvVw",
  authDomain: "robert-dd6bd.firebaseapp.com",
  projectId: "robert-dd6bd",
  storageBucket: "robert-dd6bd.firebasestorage.app",
  messagingSenderId: "464296193419",
  appId: "1:464296193419:web:4d439f7d225d153976538e",
  measurementId: "G-N5WW7VK051"
};

        // Inicialización de Servicios
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Control de Estado Global
        let currentUserData = null;
        let currentChatMode = "general";
        let privateTargetUser = "";
        let isFirstLoad = true;
        let isLoginMode = false; // Modo inicial: Registro
        let typingTimeout;

        // --- MANEJADOR DE PERSISTENCIA AUTOMÁTICA DE SESIÓN ---
        auth.onAuthStateChanged((user) => {
            const splash = document.getElementById("splashScreen");
            if (user) {
                // Si el usuario ya inició sesión previamente, buscamos su apodo en la base de datos
                db.ref('users_profiles/' + user.uid).once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        currentUserData = snapshot.val();
                        currentUserData.uid = user.uid;
                        launchChatInterface();
                    } else {
                        // Resguardo por si el perfil no se creó correctamente
                        logout();
                    }
                    splash.style.opacity = "0";
                    setTimeout(() => splash.style.display = "none", 500);
                });
            } else {
                // No hay sesión activa: Mostrar pantalla de acceso
                document.getElementById("chatScreen").style.display = "none";
                document.getElementById("authScreen").style.display = "block";
                splash.style.opacity = "0";
                setTimeout(() => splash.style.display = "none", 500);
            }
        });

        // --- CAMBIAR ENTRE REGISTRO E INICIO DE SESIÓN ---
        window.switchAuthMode = function() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById("authTitle");
            const subtitle = document.getElementById("authSubtitle");
            const nickGroup = document.getElementById("nickGroup");
            const btn = document.getElementById("authBtn");
            const switchTxt = document.getElementById("authSwitch");

            if (isLoginMode) {
                title.innerText = "Iniciar Sesión";
                subtitle.innerText = "Ingresa tus credenciales para volver al chat";
                nickGroup.style.display = "none";
                btn.innerText = "Entrar";
                switchTxt.innerHTML = "¿No tienes cuenta? <span>Regístrate</span>";
            } else {
                title.innerText = "Crear Cuenta";
                subtitle.innerText = "Únete al chat secreto más seguro y veloz";
                nickGroup.style.display = "block";
                btn.innerText = "Registrarse";
                switchTxt.innerHTML = "¿Ya tienes cuenta? <span>Inicia Sesión</span>";
            }
        }

        // --- SISTEMA DE AUTENTICACIÓN AVANZADA ---
        window.handleAuth = function() {
            const email = document.getElementById("authEmail").value.trim();
            const pass = document.getElementById("authPass").value;
            const nickname = document.getElementById("authNickname").value.trim();

            if (!email || !pass) return alert("❌ Completa los campos de correo y contraseña.");
            if (pass.length < 6) return alert("❌ La contraseña debe tener al menos 6 caracteres.");

            if (isLoginMode) {
                // Iniciar Sesión Tradicional
                auth.signInWithEmailAndPassword(email, pass).catch(err => {
                    alert("❌ Error: " + err.message);
                });
            } else {
                // Crear Cuenta Nueva con Perfil Relacionado
                if (!nickname) return alert("❌ Elige un apodo para mostrar en el chat.");
                
                auth.createUserWithEmailAndPassword(email, pass).then((cred) => {
                    const userProfile = {
                        username: nickname,
                        email: email
                    };
                    // Guardamos el apodo asignado a su ID único de Firebase Auth
                    return db.ref('users_profiles/' + cred.user.uid).set(userProfile).then(() => {
                        currentUserData = userProfile;
                        currentUserData.uid = cred.user.uid;
                    });
                }).catch(err => {
                    alert("❌ Error al registrarse: " + err.message);
                });
            }
        }

        // --- ENTRADA AUTOMÁTICA AL CHAT ---
        function launchChatInterface() {
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("chatScreen").style.display = "flex";
            
            // Configurar datos visuales del perfil del usuario
            document.getElementById("myProfileName").innerText = currentUserData.username;
            document.getElementById("myAvatar").innerText = currentUserData.username.substring(0,2).toUpperCase();
            
            setupChatEngine();
        }

        // --- MOTOR LOGÍCO EN TIEMPO REAL ---
        function setupChatEngine() {
            const myStatusRef = db.ref('online_status_v7/' + currentUserData.uid);
            const myTypingRef = db.ref('typing_v7/' + currentUserData.uid);

            // Control de Estado Online/Offline Automático
            db.ref('.info/connected').on('value', (snap) => {
                if (snap.val() === true) {
                    myStatusRef.set({ username: currentUserData.username, status: "online" });
                    myStatusRef.onDisconnect().remove();
                    myTypingRef.onDisconnect().remove();
                }
            });

            // Sincronización y Renderizado de Lista de Personas Conectadas
            db.ref('online_status_v7').on('value', (snapshot) => {
                const listContainer = document.getElementById("usersList");
                listContainer.innerHTML = "";
                
                const onlineUsers = snapshot.exists() ? snapshot.val() : {};
                let count = Object.keys(onlineUsers).length;
                
                // Muestra cuántas personas hay conectadas en tiempo real
                document.getElementById("onlineCount").innerText = count;

                // Renderizar los perfiles en el panel lateral
                Object.keys(onlineUsers).forEach(uidKey => {
                    if (uidKey !== currentUserData.uid) {
                        const targetData = onlineUsers[uidKey];
                        const div = document.createElement("div");
                        div.classList.add("user-item");
                        div.onclick = () => startPrivateChat(uidKey, targetData.username);

                        div.innerHTML = `
                            <div class="user-item-info">
                                <div class="status-dot online"></div>
                                <span class="user-item-name">${targetData.username}</span>
                            </div>
                            <i class="fa-solid fa-comment-dots" style="color:var(--accent-color); font-size:0.85rem;"></i>
                        `;
                        listContainer.appendChild(div);
                    }
                });
            });

            // Receptor de Acciones Especiales (Efecto Beso)
            db.ref('special_actions_v7').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const action = snapshot.val();
                    if (action.uid !== currentUserData.uid && (Date.now() - action.timestamp < 3000)) {
                        triggerKissAnimation();
                        triggerAppNotification("❤️ ¡Beso Recibido!", `${action.sender} te envió un beso gigante.`);
                    }
                }
            });

            // Monitoreo de Indicador de Escritura
            db.ref('typing_v7').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    let writing = [];
                    Object.keys(data).forEach(id => {
                        if (id !== currentUserData.uid && data[id].isTyping === true) {
                            writing.push(data[id].name);
                        }
                    });
                    document.getElementById("typingDisplay").innerText = writing.length > 0 ? `✍️ ${writing.join(', ')} está escribiendo...` : '';
                } else {
                    document.getElementById("typingDisplay").innerText = '';
                }
            });

            loadMessages();
            setTimeout(() => { isFirstLoad = false; }, 3000);
        }

        // --- GESTOR DE MENSAJES (GENERAL / PRIVADO) ---
        function loadMessages() {
            let dbPath = 'messages_v7';
            
            if (currentChatMode === "private") {
                const sortedIds = [currentUserData.uid, privateTargetUser].sort();
                dbPath = `private_messages_v7/${sortedIds[0]}_and_${sortedIds[1]}`;
            }

            db.ref(dbPath).off(); // Limpiar oyentes anteriores
            db.ref(dbPath).on('value', (snapshot) => {
                const msgArea = document.getElementById("msgArea");
                msgArea.innerHTML = "";
                
                if (snapshot.exists()) {
                    const messages = Object.values(snapshot.val());
                    
                    messages.forEach(msg => {
                        const isMe = msg.uid === currentUserData.uid;
                        const wrapper = document.createElement("div");
                        wrapper.classList.add("msg-wrapper", isMe ? "me" : "other");

                        const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                        wrapper.innerHTML = `
                            ${!isMe ? `<div class="msg-sender">${msg.sender}</div>` : ''}
                            <div class="msg">${msg.text}</div>
                            <div class="msg-meta">${timeStr}</div>
                        `;
                        msgArea.appendChild(wrapper);
                    });
                    
                    msgArea.scrollTop = msgArea.scrollHeight;

                    // Alertas Flotantes in-app si el mensaje llega en segundo plano
                    if (!isFirstLoad && messages.length > 0) {
                        const lastMsg = messages[messages.length - 1];
                        if (lastMsg.uid !== currentUserData.uid) {
                            const modeName = currentChatMode === "private" ? "💬 Privado" : "👥 General";
                            triggerAppNotification(`De: ${lastMsg.sender} (${modeName})`, lastMsg.text);
                        }
                    }
                }
            });
        }

        // --- ACCIONES Y ACTIVADORES DE INTERFAZ ---
        window.sendMessage = function() {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (text) {
                let dbPath = 'messages_v7';
                if (currentChatMode === "private") {
                    const sortedIds = [currentUserData.uid, privateTargetUser].sort();
                    dbPath = `private_messages_v7/${sortedIds[0]}_and_${sortedIds[1]}`;
                }

                db.ref(dbPath).push({
                    uid: currentUserData.uid,
                    sender: currentUserData.username,
                    text: text,
                    timestamp: Date.now()
                });
                
                input.value = "";
                db.ref('typing_v7/' + currentUserData.uid).set({ isTyping: false });
            }
        }

        window.handleTyping = function() {
            db.ref('typing_v7/' + currentUserData.uid).set({ isTyping: true, name: currentUserData.username });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                db.ref('typing_v7/' + currentUserData.uid).set({ isTyping: false });
            }, 2000);
        }

        window.startPrivateChat = function(targetUid, targetName) {
            currentChatMode = "private";
            privateTargetUser = targetUid;
            document.getElementById("privateWithLabel").innerText = targetName;
            document.getElementById("privateBanner").style.display = "flex";
            document.getElementById("usersPanel").classList.remove("active");
            loadMessages();
        }

        window.exitPrivateChat = function() {
            currentChatMode = "general";
            privateTargetUser = "";
            document.getElementById("privateBanner").style.display = "none";
            loadMessages();
        }

        window.sendKiss = function() {
            db.ref('special_actions_v7').set({ uid: currentUserData.uid, sender: currentUserData.username, type: 'kiss', timestamp: Date.now() });
            triggerKissAnimation();
        }

        function triggerKissAnimation() {
            const heart = document.getElementById("giantHeart");
            heart.style.display = "block";
            heart.style.animation = "none";
            setTimeout(() => { heart.style.animation = "heartPop 2.5s ease forwards"; }, 10);
            setTimeout(() => { heart.style.display = "none"; }, 2500);
        }

        function triggerAppNotification(title, text) {
            const notif = document.getElementById("appNotification");
            document.getElementById("notifTitle").innerText = title;
            document.getElementById("notifText").innerText = text;
            notif.classList.add("show");
            setTimeout(() => { notif.classList.remove("show"); }, 3500);
        }

        window.toggleUsersPanel = function() {
            document.getElementById("usersPanel").classList.toggle("active");
        }

        window.logout = function() {
            if(currentUserData) {
                db.ref('online_status_v7/' + currentUserData.uid).remove();
                db.ref('typing_v7/' + currentUserData.uid).remove();
            }
            auth.signOut();
        }

        window.checkEnter = function(e) { if (e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* REDES */
.redes {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
}

.redes img {
    width: 35px;
    transition: 0.3s;
}

.redes img:hover {
    transform: scale(1.2);
}

/* CONTENEDOR */
.container {
    width: 90%;
    max-width: 400px;
    margin-top: 30px;
}

/* BOTÓN PRO RGB */
.btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    margin: 15px 0;
    border-radius: 14px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    background: #111;
    overflow: hidden;
    z-index: 1;
}

/* BORDE RGB GIRATORIO */
.btn::before {
    content: "";
    position: absolute;
    top: -60%;
    left: -60%;
    width: 220%;
    height: 220%;
    background: conic-gradient(
        red, orange, yellow, lime, cyan, blue, violet, red
    );
    animation: girar 4s linear infinite;
    z-index: -2;
}

/* CAPA INTERNA */
.btn::after {
    content: "";
    position: absolute;
    inset: 3px;
    background: #111;
    border-radius: 12px;
    z-index: -1;
}

/* ANIMACIÓN */
@keyframes girar {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* HOVER PRO */
.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0,255,200,0.5);
}

/* TEXTO BOTÓN */
.btn span {
    z-index: 2;
}
</style>

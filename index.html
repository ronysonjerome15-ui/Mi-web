<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveBoard GOD MODE 💖</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
overflow:hidden;
background:linear-gradient(-45deg,#ff0080,#7928ca,#00e5ff,#00ff88);
background-size:400% 400%;
animation:bg 8s infinite;
display:flex;
flex-direction:column;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* LOGIN */
#login{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
z-index:99;
}

.box{
background:rgba(255,255,255,0.15);
padding:25px;
border-radius:20px;
color:white;
text-align:center;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
text-align:center;
}

/* APP */
#app{
display:none;
flex-direction:column;
height:100%;
}

#top{
display:flex;
justify-content:space-between;
padding:6px;
color:white;
font-weight:bold;
}

#room{
color:#00ffcc;
}

/* CANVAS */
#board{
flex:1;
background:white;
margin:5px;
border-radius:15px;
touch-action:none;
}

/* PANEL */
#panel{
display:flex;
gap:5px;
padding:5px;
}

button{
border:none;
padding:8px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* CHAT */
#chat{
height:140px;
background:rgba(0,0,0,0.4);
margin:5px;
border-radius:15px;
overflow:auto;
padding:5px;
color:white;
}

.msg{
margin:4px;
padding:6px;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
}

.me{background:#ff2d55;margin-left:auto;}
.other{background:rgba(255,255,255,0.2);}

#typing{
font-size:12px;
opacity:0.8;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>💖 GOD MODE</h2>
<input id="room" placeholder="Sala">
<br>
<input id="name" placeholder="Nombre">
<br>
<button onclick="join()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div id="top">
<div id="status">Conectando...</div>
<div id="room"></div>
</div>

<canvas id="board"></canvas>

<div id="panel">
<input type="color" id="color">
<button onclick="sendHeart()">💖</button>
<button onclick="toggleMusic()">🎵</button>
<button onclick="clearBoard()">🧹</button>
</div>

<div id="chat"></div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

</div>

<script>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCEO4JJMZ231KicEqKQ9S0OyJRFpnrtb3o",
  authDomain: "amor-205d5.firebaseapp.com",
  databaseURL: "https://amor-205d5-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "amor-205d5",
  storageBucket: "amor-205d5.firebasestorage.app",
  messagingSenderId: "817003065590",
  appId: "1:817003065590:web:da964f656dfd3e5786bcd7",
  measurementId: "G-FY78WMX1FP"
};

firebase.initializeApp(firebaseConfig);

let room="";
let name="";

function ref(path){
return firebase.database().ref("rooms/"+room+"/"+path);
}

// JOIN
function join(){
room=document.getElementById("room").value;
name=document.getElementById("name").value;

if(!room||!name) return;

localStorage.setItem("room",room);
localStorage.setItem("name",name);

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";

start();
}

// AUTO LOGIN
if(localStorage.getItem("room")){
room=localStorage.getItem("room");
name=localStorage.getItem("name");
document.addEventListener("DOMContentLoaded",start);
}

// START
function start(){

document.getElementById("room").innerText="🔒 "+room;

/* USERS */
const users=ref("users");
const me=users.child(name);

firebase.database().ref(".info/connected").on("value",s=>{
if(s.val()){
me.set(true);
me.onDisconnect().remove();
}
});

users.on("value",s=>{
let d=s.val()||{};
document.getElementById("status").innerText=
"🟢 Online "+Object.keys(d).length;
});

/* CHAT */
const chat=ref("chat");

chat.on("child_added",s=>{
let m=s.val();
let d=document.createElement("div");
d.className="msg "+(m.name==name?"me":"other");
d.innerHTML="<b>"+m.name+"</b><br>"+m.text;
document.getElementById("chat").appendChild(d);
});

/* DRAW OPTIMIZED */
const draw=ref("draw");
const c=document.getElementById("board");
const ctx=c.getContext("2d");

function resize(){
c.width=c.clientWidth;
c.height=c.clientHeight;
}
resize();

let drawing=false;
let last={x:0,y:0};

draw.on("child_added",s=>{
let d=s.val();
ctx.beginPath();
ctx.moveTo(d.x1,d.y1);
ctx.lineTo(d.x2,d.y2);
ctx.stroke();
});

c.addEventListener("pointerdown",e=>{
drawing=true;
last=get(e);
});

c.addEventListener("pointermove",e=>{
if(!drawing)return;

let p=get(e);

draw.push({
x1:last.x,
y1:last.y,
x2:p.x,
y2:p.y,
name:name
});

last=p;
});

c.addEventListener("pointerup",()=>drawing=false);

function get(e){
let r=c.getBoundingClientRect();
return{x:e.clientX-r.left,y:e.clientY-r.top};
}

/* 💖 HEARTS */
window.sendHeart=function(){
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="absolute";
h.style.left=Math.random()*90+"vw";
h.style.top="80vh";
h.style.fontSize="25px";
h.style.animation="float 2s linear";
document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);
}

/* 🎵 MUSIC SYNC */
let music=document.getElementById("music");

window.toggleMusic=function(){
ref("music").set(true);
}

ref("music").on("value",s=>{
if(s.val()){
music.play();
}else{
music.pause();
}
});

/* 🧹 CLEAR */
window.clearBoard=function(){
ref("draw").remove();
ctx.clearRect(0,0,c.width,c.height);
}

}
</script>

</body>
</html>

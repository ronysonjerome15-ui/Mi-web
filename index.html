<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAXTRA DESCARGA</title>

<style>
:root {
    --bg: #0a0a0a;
    --text: #fff;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* REDES */
.redes {
    display: flex;
    gap: 20px;
    padding: 15px;
}

.redes img {
    width: 35px;
    transition: 0.3s;
}

.redes img:hover {
    transform: scale(1.2);
}

/* BOTONES */
.container {
    width: 90%;
    max-width: 400px;
    margin-top: 30px;
}

.btn {
    position: relative;
    display: flex;
    justify-content: center;
    padding: 16px;
    margin: 15px 0;
    border-radius: 14px;
    color: white;
    text-decoration: none;
    background: #111;
}

.btn::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    animation: girar 4s linear infinite;
    z-index: -2;
}

.btn::after {
    content: "";
    position: absolute;
    inset: 3px;
    background: #111;
    border-radius: 12px;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

/* FORM */
.contacto {
    width: 90%;
    max-width: 400px;
    margin: 40px 0;
    padding: 20px;
    background: #111;
    border-radius: 15px;
    text-align: center;
}

.contacto input {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

.contacto button {
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, cyan, magenta);
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- REDES -->
<div class="redes">
  <a href="https://www.tiktok.com/@soy_saxtra" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
  <a href="https://www.youtube.com/@soy_saxtra" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
  <a href="https://www.instagram.com/soy_saxtra" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
</div>

<!-- BOTONES -->
<div class="container">
  <a class="btn" href="#"><span>AIMBOT CUELLO</span></a>
</div>

<!-- FORMULARIO -->
<div class="contacto">
  <h2>📩 REGÍSTRATE</h2>

  <form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="text" id="tiktok" placeholder="Usuario TikTok" required>
    <input type="email" id="correo" placeholder="Correo" required>
    <input type="tel" id="telefono" placeholder="Teléfono" required>
    <button type="submit">Registrarse</button>
  </form>

  <p id="estado"></p>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZkesdFr1CwaoNxBfp3dAoIc0M8rr6fL8",
  authDomain: "proyento-45ac9.firebaseapp.com",
  projectId: "proyento-45ac9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// FORM
document.getElementById("formulario").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const tiktok = document.getElementById("tiktok").value;
  const correo = document.getElementById("correo").value;
  const telefono = document.getElementById("telefono").value;

  try {
    // 🔥 GUARDAR EN FIREBASE
    await addDoc(collection(db, "usuarios"), {
      nombre,
      tiktok,
      correo,
      telefono,
      fecha: new Date()
    });

    // 🔥 ENVIAR A FORMSpree (correo)
    await fetch("https://formspree.io/f/mnjwanaj", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nombre,
        tiktok,
        email: correo,
        telefono
      })
    });

    document.getElementById("estado").innerText="✅ Registro enviado y guardado";
    document.getElementById("formulario").reset();

  } catch (error) {
    document.getElementById("estado").innerText="❌ Error al enviar";
  }
});
</script>

</body>
</html>

    content: "";
    position: absolute;
    top: -60%;
    left: -60%;
    width: 220%;
    height: 220%;
    background: conic-gradient(
        red, orange, yellow, lime, cyan, blue, violet, red
    );
    animation: girar 4s linear infinite;
    z-index: -2;
}

/* CAPA INTERNA */
.btn::after {
    content: "";
    position: absolute;
    inset: 3px;
    background: #111;
    border-radius: 12px;
    z-index: -1;
}

/* ANIMACIÓN */
@keyframes girar {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* HOVER PRO */
.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(0,255,200,0.5);
}

/* TEXTO BOTÓN */
.btn span {
